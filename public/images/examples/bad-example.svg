<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background - pool scene -->
  <rect width="400" height="300" fill="#e0f4ff"/>
  <!-- Water surface (higher - covers most of body) -->
  <rect y="110" width="400" height="190" fill="#7dd3fc" rx="0"/>
  <!-- Pool edge -->
  <rect x="0" y="100" width="400" height="14" fill="#d4d4d8" rx="2"/>
  
  <!-- Swimmer - only head and shoulders visible above water -->
  <!-- Head -->
  <circle cx="180" cy="80" r="16" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
  <!-- Shoulders (partially visible) -->
  <line x1="160" y1="96" x2="200" y2="96" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Body hidden under water (dashed/transparent) -->
  <line x1="180" y1="96" x2="180" y2="160" stroke="#92400e" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="180" y1="160" x2="165" y2="200" stroke="#92400e" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="180" y1="160" x2="195" y2="200" stroke="#92400e" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  
  <!-- Water overlay to show body is submerged -->
  <rect y="110" width="400" height="190" fill="#7dd3fc" opacity="0.5" rx="0"/>
  
  <!-- Red X marks on hidden body parts -->
  <circle cx="180" cy="140" r="12" fill="#ef4444" opacity="0.3"/>
  <line x1="174" y1="134" x2="186" y2="146" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="186" y1="134" x2="174" y2="146" stroke="#ef4444" stroke-width="2.5"/>
  
  <circle cx="175" cy="190" r="12" fill="#ef4444" opacity="0.3"/>
  <line x1="169" y1="184" x2="181" y2="196" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="181" y1="184" x2="169" y2="196" stroke="#ef4444" stroke-width="2.5"/>
  
  <!-- Water level label -->
  <line x1="10" y1="110" x2="390" y2="110" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="370" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" font-style="italic">water level</text>
  
  <!-- Badge -->
  <rect x="220" y="240" width="160" height="44" rx="10" fill="#ef4444" opacity="0.15"/>
  <rect x="220" y="240" width="160" height="44" rx="10" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">✗ WON'T WORK</text>
  <text x="300" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Only head/upper body visible</text>
  
  <!-- Title -->
  <rect x="10" y="10" width="220" height="28" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="120" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">✗ Wrong: Body Hidden Under Water</text>
  
  <!-- Annotation arrow -->
  <text x="260" y="80" font-family="Arial, sans-serif" font-size="9" fill="#dc2626" font-weight="bold">Only head visible</text>
  <text x="260" y="92" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">= detection fails!</text>
</svg>
