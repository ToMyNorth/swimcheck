<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background - pool scene -->
  <rect width="400" height="300" fill="#e0f4ff"/>
  <rect y="180" width="400" height="120" fill="#7dd3fc" rx="0"/>
  <!-- Pool edge -->
  <rect x="0" y="170" width="400" height="14" fill="#d4d4d8" rx="2"/>
  
  <!-- Swimmer full body (side view) - stick figure style -->
  <!-- Head -->
  <circle cx="120" cy="115" r="16" fill="#fbbf24" stroke="#92400e" stroke-width="2"/>
  <!-- Body -->
  <line x1="120" y1="131" x2="120" y2="190" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms (swimming pose) -->
  <line x1="120" y1="148" x2="90" y2="130" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="148" x2="155" y2="160" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="120" y1="190" x2="100" y2="230" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="190" x2="145" y2="232" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="100" y1="230" x2="90" y2="235" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <line x1="145" y1="232" x2="155" y2="237" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Keypoint dots -->
  <circle cx="120" cy="115" r="4" fill="#22c55e"/>
  <circle cx="120" cy="148" r="4" fill="#22c55e"/>
  <circle cx="90" cy="130" r="4" fill="#22c55e"/>
  <circle cx="155" cy="160" r="4" fill="#22c55e"/>
  <circle cx="120" cy="190" r="4" fill="#22c55e"/>
  <circle cx="100" cy="230" r="4" fill="#22c55e"/>
  <circle cx="145" cy="232" r="4" fill="#22c55e"/>
  
  <!-- Camera icon -->
  <rect x="290" y="60" width="50" height="36" rx="6" fill="#64748b"/>
  <circle cx="315" cy="78" r="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="315" cy="78" r="5" fill="#60a5fa"/>
  <rect x="300" y="56" width="20" height="6" rx="3" fill="#64748b"/>
  <!-- Camera view lines -->
  <line x1="290" y1="96" x2="170" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="340" y1="96" x2="80" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  
  <!-- Badge -->
  <rect x="220" y="240" width="160" height="44" rx="10" fill="#22c55e" opacity="0.15"/>
  <rect x="220" y="240" width="160" height="44" rx="10" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#15803d">✓ GOOD EXAMPLE</text>
  <text x="300" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Full body visible, side view</text>
  
  <!-- Title -->
  <rect x="10" y="10" width="180" height="28" rx="6" fill="#22c55e" opacity="0.9"/>
  <text x="100" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">✓ Correct: Full Body Visible</text>
</svg>
