<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="water2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#water2)"/>
  <path d="M0,130 Q50,125 100,130 Q150,135 200,130 Q250,125 300,130 Q350,135 400,130" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="175" x2="400" y2="175" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,3" opacity="0.3"/>
  <rect x="0" y="270" width="400" height="30" fill="#cbd5e1" rx="2"/>
  <!-- Swimmer - Breaststroke front/side view -->
  <g transform="translate(200, 145)">
    <!-- Torso -->
    <ellipse cx="0" cy="5" rx="35" ry="18" fill="#f97316" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-22" r="15" fill="#fbbf24"/>
    <!-- Cap -->
    <path d="M-15,-22 Q-15,-37 0,-37 Q15,-37 15,-22" fill="#ef4444"/>
    <!-- Goggles -->
    <ellipse cx="-5" cy="-22" rx="5" ry="3.5" fill="#1e3a5f" opacity="0.8"/>
    <ellipse cx="7" cy="-22" rx="5" ry="3.5" fill="#1e3a5f" opacity="0.8"/>
    <!-- Arms spread out (breaststroke pull) -->
    <line x1="-30" y1="-5" x2="-75" y2="-25" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="-75" y1="-25" x2="-90" y2="-10" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="30" y1="-5" x2="75" y2="-25" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="75" y1="-25" x2="90" y2="-10" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <!-- Legs (frog kick) -->
    <line x1="-15" y1="20" x2="-40" y2="45" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="-40" y1="45" x2="-55" y2="35" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <line x1="15" y1="20" x2="40" y2="45" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <line x1="40" y1="45" x2="55" y2="35" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <!-- Water ripples -->
    <path d="M-90,0 Q-70,-5 -50,0" fill="none" stroke="#bfdbfe" stroke-width="1.5" opacity="0.6"/>
    <path d="M50,0 Q70,-5 90,0" fill="none" stroke="#bfdbfe" stroke-width="1.5" opacity="0.6"/>
  </g>
  <g transform="translate(50, 30)">
    <rect width="140" height="28" rx="14" fill="#0f172a" opacity="0.7"/>
    <text x="70" y="19" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold">FRONT VIEW ✓</text>
  </g>
  <text x="200" y="258" text-anchor="middle" fill="#1e40af" font-family="Arial,sans-serif" font-size="14" font-weight="600">Breaststroke</text>
</svg>
